name: voice-agent-nat

services:
  tts-service:
    image: nvcr.io/nim/nvidia/magpie-tts-multilingual:1.6.0
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
    ports:
      - "50151:50051"
    volumes:
      - tts_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "/bin/grpc_health_probe -addr=:50051 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 3000s # longer startup time needed for TRT engine build if prebuilt engine is not available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  asr-service:
    image: nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us:1.4.0
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9001
      - NIM_GRPC_API_PORT=50052
      - NIM_TAGS_SELECTOR=mode=str,vad=silero
    ports:
      - "50152:50052"
    volumes:
      - asr_cache:/opt/nim/.cache
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "/bin/grpc_health_probe -addr=:50052 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2400s # longer startup time needed if prebuilt engine is not available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]     

  nvidia-llm:
    image: nvcr.io/nim/meta/llama-3.1-70b-instruct:1.14
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=8000
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
      # - NIM_ENABLE_KV_CACHE_REUSE=1 # enable this if you have enough GPU VRAM for best performance
    ports:
      - "8080:8000"
    volumes:
      - llm_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 1800s # longer startup time needed for TRT engine build if prebuilt engine is not available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2', '3']
              capabilities: [gpu]
              
  python-app:
    build:
      context: ../../
      dockerfile: examples/nat_agent/Dockerfile
    ports:
      - "7860:7860" # Comment out to use Websocket transport
      # - "8100:8100" # Uncomment to use Websocket transport
    command: ["uv", "run", "bot.py"]
    # Switch for using websocket transport
    # command: ["uv", "run", "bot_websocket.py"]
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}

      # NAT Agent Configuration
      - NAT_AGENT_SERVER_URL=http://nat-agent:8000
      - NAT_CONFIG_FILE_PATH=/app/examples/nat_agent/agent/configs/config.yml

      - ASR_SERVER_URL=asr-service:50052
      - TTS_SERVER_URL=tts-service:50051

      - ASR_MODEL_NAME=parakeet-1.1b-en-US-asr-streaming-silero-vad-sortformer
      - TTS_MODEL_NAME=magpie_tts_ensemble-Magpie-Multilingual
      - TTS_CLOUD_FUNCTION_ID=${TTS_CLOUD_FUNCTION_ID}

      - ASR_LANGUAGE=en-US
      - TTS_LANGUAGE=en-US
      - TTS_VOICE_ID=Magpie-Multilingual.EN-US.Aria
      - VAD_PROFILE=${VAD_PROFILE:-ASR} # Silero or ASR
      - ZERO_SHOT_AUDIO_PROMPT= # set this only if using a zero-shot TTS model with a custom audio prompt
      - ENABLE_SPECULATIVE_SPEECH=${ENABLE_SPECULATIVE_SPEECH:-true} # set to false to disable speculative speech processing

    # Switch for using websocket transport
    #   - STATIC_DIR=/app/static
    # volumes:
    #   - ../voice_agent_websocket/static/:/app/static

    depends_on:
      tts-service:
        condition: service_healthy
      asr-service:
        condition: service_healthy
      nat-agent:
        condition: service_healthy
      nvidia-llm:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7860/docs || exit 1"] # Change port 7860 on 8100
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Comment out for websocket transport
  ui-app:
    build:
      context: ../webrtc_ui
      dockerfile: Dockerfile
    ports:
      - "9000:8000"
    depends_on:
      - python-app
    restart: unless-stopped

  nat-agent:
    build:
      context: ./
      dockerfile: ./agent/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - PHOENIX_ENDPOINT=http://phoenix:6006/v1/traces
    depends_on:
      nvidia-llm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"  # UI and OTLP HTTP collector
      - "4317:4317"  # OTLP gRPC collector

volumes:
  tts_cache:
  asr_cache:
  llm_cache:
