name: voice-agent-websocket

services:
  tts-service:
    image: nvcr.io/nim/nvidia/magpie-tts-multilingual:1.6.0
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
    ports:
      - "50151:50051"
    volumes:
      - tts_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "/bin/grpc_health_probe -addr=:50051 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 3000s # longer startup time needed for TRT engine build if prebuilt engine is not available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  asr-service:
    image: nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us:1.4.0
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=9001
      - NIM_GRPC_API_PORT=50052
      - NIM_TAGS_SELECTOR=mode=str,vad=silero
    ports:
      - "50152:50052"
    volumes:
      - asr_cache:/opt/nim/.cache
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "/bin/grpc_health_probe -addr=:50052 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 2400s # longer startup time needed if prebuilt engine is not available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  nvidia-llm:
    image: nvcr.io/nim/meta/llama-3.1-8b-instruct:1.8.6
    user: "0:0"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
      - NIM_HTTP_API_PORT=8000
      - NIM_ENABLE_KV_CACHE_REUSE=1
    ports:
      - "18000:8000"
    volumes:
      - llm_cache:/opt/nim/.cache
    shm_size: 16GB
    ulimits:
      nofile: 2048
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health/ready\").read()' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 1800s # longer startup time needed for TRT engine build if prebuilt engine is not available.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]

  python-app:
    build:
      context: ../../
      dockerfile: examples/voice_agent_websocket/Dockerfile
    
    ports:
      - "8100:8100"
    volumes:
      - ./audio_dumps:/app/examples/voice_agent_websocket/audio_dumps
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - ENABLE_SPECULATIVE_SPEECH=${ENABLE_SPECULATIVE_SPEECH:-false}

      - ASR_SERVER_URL=asr-service:50052
      - TTS_SERVER_URL=tts-service:50051
      - NVIDIA_LLM_URL=http://nvidia-llm:8000/v1

      - ASR_MODEL_NAME=parakeet-1.1b-en-US-asr-streaming-silero-vad-sortformer
      - TTS_MODEL_NAME=magpie_tts_ensemble-Magpie-Multilingual
      - NVIDIA_LLM_MODEL=meta/llama-3.1-8b-instruct

      - ASR_LANGUAGE=en-US
      - TTS_LANGUAGE=en-US
      - TTS_VOICE_ID=Magpie-Multilingual.EN-US.Aria
      - VAD_PROFILE=${VAD_PROFILE:-ASR} # Silero or ASR
      - ZERO_SHOT_AUDIO_PROMPT= # set this only if using a zero-shot TTS model with a custom audio prompt
      - CHAT_HISTORY_LIMIT=${CHAT_HISTORY_LIMIT}

    depends_on:
      tts-service:
        condition: service_healthy  
      asr-service:
        condition: service_healthy
      nvidia-llm:
        condition: service_healthy

volumes:
  tts_cache:
  asr_cache:
  llm_cache: